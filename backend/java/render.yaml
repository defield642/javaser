services:
  - type: web
    name: gexup-java-backend
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 8080
      - key: RELAY_TOKEN
        generateValue: true
      - key: RELAY_CONNECT_TIMEOUT_MS
        value: 2000
